spring:
  application:
    name: expense-tracker-api
  
  # Step 3: Database configuration
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/expense_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  # Step 3: Flyway settings
  flyway:
    enabled: true
    baseline-on-migrate: true

# Step 2: Swagger/OpenAPI path customization (optional)
springdoc:
  swagger-ui:
    path: /swagger-ui.html
