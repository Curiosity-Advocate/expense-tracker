spring:
  application:
    name: expense-tracker-api
  
  # Step 3: Database configuration
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/expense_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

jpa:
  show-sql: true
  properties:
    hibernate:
      format_sql: true
      ddl-auto: validate # Validate the java representation of DB tables don't drift at run time

  flyway:
    enabled: true
    baseline-on-migrate: true

app:
  jwt:
    secret: ${JWT_SECRET}          # must be set as environment variable — never hardcoded
    expiry-days: 7                 # V1: long-lived tokens. Step-up auth handles sensitive actions.

springdoc:
  swagger-ui:
    path: /swagger-ui.html
